# Run the secrets proxy as its own isolated container — the endorsed shape, since
# real isolation is the agent's process being unable to reach this container's env
# or filesystem. The REAL keys live only in this repo's gitignored `.env`.
#
#   cp .env-example .env      # put the REAL keys in .env
#   docker compose up --build
#
# Then point a KEYLESS agent at http://<host>:8785/openai and /anthropic with
# PLACEHOLDER keys. See README.md.
name: prax-secrets-proxy

services:
  secrets-proxy:
    build:
      context: .
    image: prax-secrets-proxy:latest
    pull_policy: build          # it's a locally-built image; don't try to pull it
    restart: unless-stopped
    # The ONLY place the real keys are read. This file is gitignored.
    env_file: .env
    environment:
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=8785
    volumes:
      # TLS cert/key (generated by scripts/gen-cert.sh) — mounted read-only so the
      # container serves HTTPS. Only needed when PROXY_TLS_CERT/KEY are set in .env.
      - ./certs:/app/certs:ro
    ports:
      # Loopback-published by default — unauthenticated by design, so reachability
      # is the control. Drop the "127.0.0.1:" prefix (or attach to a private
      # network) only when a remote keyless agent must reach it.
      - "127.0.0.1:8785:8785"
    healthcheck:
      test: ["CMD", "python", "-m", "secrets_proxy._healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── FORWARD (transparent MITM egress) proxy — proxies ALL of Prax's egress ──
  # Opt-in:  docker compose --profile forward up
  # Runs mitmproxy with our addon; injects the right credential by destination
  # host from PROXY_FORWARD_MAP (generated from Prax's credential registry:
  # `python -m prax.services.credential_registry --export-forward-map`).
  #
  # ⚠️ This process TERMINATES TLS for ALL of Prax's egress — it sees every
  # request body and holds every key. Run it LOCKED DOWN and isolated from Prax
  # (its own container/user), exactly like the reverse proxy. Prax sets
  # HTTPS_PROXY at it and trusts the mitmproxy CA. See the prax repo:
  # docs/security/deployment-topology.md.
  forward-proxy:
    profiles: ["forward"]
    image: mitmproxy/mitmproxy:latest
    restart: unless-stopped
    env_file: .env               # the real keys — same gitignored file
    command: >
      mitmdump --mode regular --listen-host 0.0.0.0 --listen-port 8786
      --set stream_large_bodies=1m
      -s /addon/secrets_proxy/mitm_addon.py
    environment:
      - PYTHONPATH=/addon
      - PROXY_FORWARD_MAP=/config/forward-map.json
    volumes:
      - ./secrets_proxy:/addon/secrets_proxy:ro   # the addon + injector
      - ./forward-map.json:/config/forward-map.json:ro
      - mitm-ca:/home/mitmproxy/.mitmproxy        # persist the generated MITM CA
    ports:
      - "127.0.0.1:8786:8786"

volumes:
  mitm-ca:
